<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#b42318" />
    <title>研经笔记离线提示</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f4f4f2;
        --foreground: #111111;
        --muted: #666666;
        --accent: #b42318;
        --line: #dedbd7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 244, 242, 1) 340px),
          var(--background);
        color: var(--foreground);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 520px);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(17, 17, 17, 0.07);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.55rem, 3vw, 2rem);
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .mark {
        width: 44px;
        height: 44px;
        margin-bottom: 20px;
        border-radius: 8px;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>现在无法连接研经笔记</h1>
      <p>这个应用的数据来自你的本地服务和数据库。请先运行双击启动版，等待浏览器打开后再回到这里继续使用。</p>
    </main>
  </body>
</html>
